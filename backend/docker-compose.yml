version: "3"

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db

  redis:
    image: redis:alpine

  db:
    image: postgres
    environment:
      POSTGRES_DB: segments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  worker:
    build: .
    command: celery -A core worker -l info
    depends_on:
      - redis
